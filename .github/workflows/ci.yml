name: CI & Deployment Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  ACT: false

jobs:
  quality-gate:
    name: Code & Context Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: latest
          environments: ci-dev

      - name: Run Pre-Commit Hooks
        run: SKIP=check-identity,enforce-author-identity pixi run -e ci-dev pre-commit run --all-files

      - name: Run Test Suite
        run: pixi run -e ci-dev pytest

      - name: Run Trivy vulnerability scanner in fs mode
        if: ${{ !env.ACT }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          skip-dirs: '.pixi,.cache'
          severity: 'CRITICAL,HIGH'
